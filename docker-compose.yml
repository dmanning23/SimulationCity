version: "3.9"

# MongoDB is hosted on Atlas (replica set included — required for Phase 3 change streams).
# Set MONGODB_URL in backend/.env to your Atlas connection string.
# This file only manages local infrastructure that isn't hosted externally.

services:
  redis:
    image: redis:7-alpine
    container_name: simulationcity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Local MongoDB for tests only — keeps test writes off Atlas.
  # Tests hardcode localhost:27017 via conftest.py os.environ.setdefault.
  mongodb-test:
    image: mongo:7
    container_name: simulationcity-mongo-test
    ports:
      - "27017:27017"
    tmpfs:
      - /data/db  # in-memory — no persistence needed for tests
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
