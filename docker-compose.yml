version: "3.9"

# NOTE: MongoDB change streams (Phase 3) require a replica set.
# This standalone config is sufficient for Phase 1 & 2.
# See docs/development-roadmap.md Phase 3 for replica set setup.

services:
  mongodb:
    image: mongo:7
    container_name: simulationcity-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: simulationcity
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: simulationcity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongo_data:
  redis_data:
